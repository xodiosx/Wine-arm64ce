name:  Wine ARM64 termux (Wayland Native)

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine Branch'
        required: false
        default: 'staging'
        type: choice
        options:
        - proton
        - staging
        - winearm64ec
      wine_version:
        description: 'Wine Version (e.g., 9.22, or latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: Install Base Tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file

      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          echo "🧹 Freeing disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Setup Sysroot Environment
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential git make cmake ninja-build autoconf automake \
            libtool pkg-config gettext flex bison nasm \
            python3 python3-setuptools ca-certificates wget \
            curl xz-utils file libfreetype6-dev \
            clang llvm lld unzip \
            binutils-aarch64-linux-gnu \
            mingw-w64 gradle \
            librsvg2-bin \
            dpkg-dev libwayland-dev \
            fakeroot \
            less

      - name: Download and Extract Termuxfs for AARCH64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar

          cd $HOME/termuxfs/aarch64/data/data/com.termux/files
          wget -q https://github.com/mebabo1/menano/releases/download/Box/wayland_scanner.tar.gz
          tar xf wayland_scanner.tar.gz
          rm wayland_scanner.tar.gz
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Patch wayland-scanner.pc for wlroots Cross-Compilation
        run: |
          HOST_SCANNER=$(which wayland-scanner)
          echo "Real Host Scanner: $HOST_SCANNER"

          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          mkdir -p $TERMUX_PREFIX/share/pkgconfig

          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          bindir=\${exec_prefix}/bin
          wayland_scanner=$HOST_SCANNER

          Name: Wayland Scanner
          Description: Wayland scanner stub redirecting to host for cross-compilation
          Version: 1.22.0
          EOF
          cp $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc $TERMUX_PREFIX/share/pkgconfig/wayland-scanner.pc

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/27.3.13750724
          key: android-ndk-r27d
      
      - name: Set up Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/Android/Sdk/ndk
          cd $HOME/Android/Sdk/ndk
          wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          mv android-ndk-r27d 27.3.13750724

      - name: Install llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: Clone Wine Source Repository
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            winearm64ec)
              git clone -b "proton_11.0" https://github.com/WinNative-Emu/proton-wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then git checkout "$WINE_VERSION"; fi
              ;;
            staging)
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then git checkout "wine-$WINE_VERSION"; fi
              ;;
            proton)
              git clone -b "bleeding-edge" https://github.com/ziad9267/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then git checkout "$WINE_VERSION"; fi
              ;;
          esac

          WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64-wayland"
          
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV

      - name: Autogen
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}/source
                    # Inject missing esync_init declaration
          FILE_SERVER="dlls/ntdll/unix/server.c"
          if [ -f "$FILE_SERVER" ]; then
            sed -i '1s/^/extern void esync_init(int);\n/' "$FILE_SERVER"
          fi
          
          if [ ! -f "configure" ]; then ./autogen.sh; fi

      - name: Build Native wine64 Tools (Host)
        run: |
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          ../source/configure \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-vulkan \
            --without-wayland
          
          make __tooldeps__ -j$(nproc) > /dev/null
          make -C nls
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/

      - name: Prepare Tools Directory
        run: |
          set -e
          mkdir -p /opt/wine64-native
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            cp -af /opt/nls-backup/. /opt/wine64-native/nls/
          fi

      - name: Android Specific Overrides
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          # Keep the virtual.c override if it is required for your Termux memory management
          #curl -L https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/dlls/ntdll/unix/virtual.c -o dlls/ntdll/unix/virtual.c
          
          # REMOVED the env_pro10.c download line so Wine uses its native env.c

      - name: Termux Path & PulseAudio Integration
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source          
          #find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec sed -i 's|/tmp|/data/data/com.termux/files/usr/tmp|g' {} + 2>/dev/null || true
                    
          curl -L https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/dlls/ntdll/unix/server.c -o dlls/ntdll/unix/server.c
          FILE_SERVER="dlls/ntdll/unix/server.c"
          if [ -f "$FILE_SERVER" ]; then
            sed -i '1s/^/extern void esync_init(int);\n/' "$FILE_SERVER"
          fi
          
          if [ ! -f "configure" ]; then ./autogen.sh; fi

      - name: Build ARM64 WOW64 (Wayland Native)
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64

          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export deps="$HOME/termuxfs/aarch64/data/data/com.termux/files/usr"
          export RUNTIME_PATH="/data/data/com.termux/files/usr"
          export TOOLCHAIN="$HOME/Android/Sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export TARGET=aarch64-linux-android28
          export CC=$TOOLCHAIN/$TARGET-clang
          export CXX=$TOOLCHAIN/$TARGET-clang++

          export HOST_WAYLAND_SCANNER=$(which wayland-scanner)

          # Wayland Stubs 
          cat > "$deps/lib/pkgconfig/wayland-client.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-client
          Description: Wayland client bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-client -lffi -landroid-shmem
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/lib/pkgconfig/wayland-egl.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-egl
          Description: Wayland EGL bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-egl
          Cflags: -I\${includedir}
          EOF

          # Force cache variables to bypass Wayland linker tests
          export ac_cv_lib_wayland_client_wl_display_connect=yes
          export ac_cv_lib_wayland_server_wl_display_init_shm=yes
          export ac_cv_lib_wayland_egl_wl_egl_window_create=yes
          export ac_cv_lib_xkbcommon_xkb_context_new=yes
          export ac_cv_lib_xkbregistry_rxkb_context_new=yes
          export ac_cv_header_wayland_client_h=yes
          export ac_cv_header_wayland_egl_h=yes
          export ac_cv_header_xkbcommon_xkbcommon_h=yes
          export ac_cv_header_xkbcommon_xkbregistry_h=yes
          export ac_cv_header_linux_input_h=yes
          export ac_cv_prog_wayland_scanner=$(which wayland-scanner)
          export ac_cv_func_shm_open=yes
          export ac_cv_search_shm_open="none required"
          export ac_cv_lib_soname_wayland_client=libwayland-client.so
          export ac_cv_lib_soname_wayland_egl=libwayland-egl.so
          export ac_cv_lib_soname_wayland_cursor=libwayland-cursor.so
          export ac_cv_lib_soname_xkbcommon=libxkbcommon.so
          export ac_cv_lib_soname_xkbregistry=libxkbregistry.so
          export ac_cv_lib_wayland_cursor_wl_cursor_image_get_buffer=yes
          export WAYLAND_CURSOR_CFLAGS="-I$deps/include"
          export WAYLAND_CURSOR_LIBS="-L$deps/lib -lwayland-cursor"
          export XKBCOMMON_CFLAGS="-I$deps/include"
          export XKBCOMMON_LIBS="-L$deps/lib -lxkbcommon"
          export XKBREGISTRY_CFLAGS="-I$deps/include"
          export XKBREGISTRY_LIBS="-L$deps/lib -lxkbregistry"

          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export FREETYPE_LIBS="-L$deps/lib -lfreetype"
          
          
          
          export PKG_CONFIG_LIBDIR=$deps/lib/pkgconfig:$deps/share/pkgconfig
          export WAYLAND_SCANNER="$(which wayland-scanner)"

          export WAYLAND_CLIENT_CFLAGS="-I$deps/include -D__ANDROID__ -DHAVE_SHM_UTILS"
          export WAYLAND_CLIENT_LIBS="-L$deps/lib -lwayland-client -lffi -landroid-shmem"
          export WAYLAND_SERVER_CFLAGS="-I$deps/include -D__ANDROID__ -DHAVE_SHM_UTILS"
          export WAYLAND_SERVER_LIBS="-L$deps/lib -lwayland-server -lffi -landroid-shmem"

          
          export CPPFLAGS="-I$deps/include --sysroot=$TOOLCHAIN/../sysroot"
          
          # Fixed LDFLAGS: Safe for compiler checks
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$RUNTIME_PATH/lib"
                 
          export CFLAGS="-O2 -pipe -ftree-vectorize -Wno-error -Wno-implicit-function-declaration -Wno-incompatible-pointer-types"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"

          export WINE_NLS_DIR=/opt/wine64-native/nls

          # Configuration strictly omitting X11 and injecting Wayland
          ../configure \
            --host=$TARGET \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --with-wine-tools=/opt/wine64-native \
            --enable-wineandroid_drv=no \
            --disable-win16 \
            --with-wayland \
            --without-x \
            --without-xshm \
            --without-xshape \
            --without-xfixes \
            --without-xcursor \
            --without-xrandr \
            --without-xrender \
            --without-xxf86vm \
            --with-pulse \
            --without-alsa \
            --without-oss \
            --without-coreaudio \
            --without-ffmpeg \
            --disable-tests
            
          make -j$(nproc) > build.log 2>&1 || (tail -n 100 build.log && exit 1)
          mkdir -p /tmp/wine-install-wow64
          make install

      - name: Library Path Consolidation
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          WINE_ARCH="aarch64"

          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          mkdir -p "$TARGET_PREFIX/share/wine/fonts"

          find "$BUILD_DIR" -name "ntdll.so" -exec cp -vL {} "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/dlls" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/" \;

          [ -d "/opt/wine64-native/nls" ] && cp -v "/opt/wine64-native/nls"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          [ -d "${{ env.WINE64_DIR }}/source/fonts" ] && cp -v "${{ env.WINE64_DIR }}/source/fonts"/*.ttf "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || true

          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              found=$(find "$BUILD_DIR" -type f -name "$prog" -executable | head -1)
              [ -n "$found" ] && cp -vL "$found" "$TARGET_PREFIX/arm64-v8a/bin/"
          done

          if [ -f "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/ntdll.so" ]; then
              cd "$TARGET_PREFIX/arm64-v8a/bin"
              ln -sf "../lib/wine/$WINE_ARCH-unix/ntdll.so" "ntdll.so"
          fi
          
          if [ -f "wine" ]; then
              cp -r wine wine64
          fi

      - name: Package Output
        run: |
          mkdir -p wine-package/wine 
          cp -r /tmp/wine-install-wow64/* wine-package/wine/
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C wine-package wine
          sha256sum *.tar.xz > checksums.txt

      - name: Upload Artifacts (for workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: Wine-Wayland-${{ github.event.inputs.wine_branch || 'staging' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: Set Build Date
        run: echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-wayland-${{ env.BUILD_DATE }}-${{ github.run_id }}
          name: "Wine ARM64 Wayland - ${{ env.BUILD_DATE }} (${{ github.event.inputs.wine_branch || 'staging' }})"
          body: |
            🍷 **Wine ARM64 WOW64 (Wayland Native) Build**
            - Branch: `${{ github.event.inputs.wine_branch || 'staging' }}`
            - Version: `${{ env.WINE_VERSION_ACTUAL }}`
            - Build: `${{ env.BUILD_NAME }}`
            - Date: `${{ env.BUILD_DATE }}`

            SHA256 checksums are included in `checksums.txt`.
          files: |
            ${{ env.BUILD_NAME }}.tar.xz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
