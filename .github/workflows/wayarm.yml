name: all Wine + patch ready for Termux (Wayland Native)

on:
  push:
    branches: [ bleeding-edge ]
  workflow_dispatch:
    inputs:
      wine_source:
        description: 'Wine source repository'
        required: true
        default: 'winearm64ec'
        type: choice
        options:
          - proton
          - staging
          - winearm64ec
          - hangover
          - longjunyu2-custom-9.16
      wine_version:
        description: 'Wine version (tag, branch, or commit; leave empty for default)'
        required: false
        default: ''
        type: string
      enable_patches:
        description: 'Apply esync init patch'
        required: true
        default: true
        type: boolean

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Clone Wine source
        run: |
          WINE_SOURCE="${{ github.event.inputs.wine_source || 'longjunyu2-custom-9.16' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || '' }}"

          case "$WINE_SOURCE" in
            proton)
              REPO="https://github.com/ValveSoftware/wine.git"
              BRANCH="proton_10.0"
              ;;
            staging)
              REPO="https://github.com/Pipetto-crypto/wine.git"
              BRANCH="proton-9.0-arm64ec"
              ;;
            winearm64ec)
              REPO="https://github.com/xodiosx/Wine-arm64ce.git"
              BRANCH="bleeding-edge"
              ;;
            hangover)
              REPO="https://github.com/AndreRH/hangover.git"
              BRANCH="arm64ec"
              ;;
            longjunyu2-custom-9.16)
              REPO="https://github.com/longjunyu2/wine-custom.git"
              BRANCH="custom-wine-9.16"
              ;;
            *)
              echo "❌ Unknown source: $WINE_SOURCE"
              exit 1
              ;;
          esac

          git clone -b "$BRANCH" "$REPO" source
          cd source
          git submodule update --init --recursive
          if [ -d wine ]; then
            mv -f wine/* ../
          fi

          if [ -n "$WINE_VERSION" ]; then
            git fetch --tags --all
            git checkout "$WINE_VERSION" || { echo "❌ Failed to checkout $WINE_VERSION"; exit 1; }
          fi

          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "WINE_SOURCE_NAME=$WINE_SOURCE" >> $GITHUB_ENV

      - name: Apply esync init patch (server/process.c)
        if: ${{ github.event.inputs.enable_patches != 'false' }}
        run: |
          cd source
          cat << 'EOF' > esync.patch
          --- a/server/process.c
          +++ b/server/process.c
          @@ -1703,6 +1710,11 @@ size_t server_init_process(void)
                           inproc_device_fd = FSYNC_USED_BY_SERVER;
                           fsync_init( pid );
                       }
          +            else if (reply->inproc_device == ESYNC_USED_BY_SERVER)
          +            {
          +                int shm_fd = wine_server_receive_fd( &handle );
          +                esync_init( shm_fd );
          +            }
                       else if (reply->inproc_device)
                       {
                           inproc_device_fd = wine_server_receive_fd( &handle );
          EOF
          git apply esync.patch

      - name: Install host dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev libfreetype-dev:i386 libfontconfig-dev:i386 \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev \
            libasound2-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libglib2.0-dev \
            libwayland-dev 
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup LLVM MinGW (with ARM64EC support)
        run: |
          sudo mkdir -p /opt
          cd /opt
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVMMINGW_DATE}/${LLVMMINGW_NAME}.tar.xz"
          sudo wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 "$URL" -O llvm-mingw.tar.xz
          sudo tar -xJf llvm-mingw.tar.xz
          sudo rm llvm-mingw.tar.xz
          echo "/opt/${LLVMMINGW_NAME}/bin" >> $GITHUB_PATH

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Termux sysroot and Wayland Stubs
        run: |
          mkdir termux && cd termux
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/wine-14/termux-rootfs.tar
          tar xf termux-rootfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          sudo chmod -R a+rX /data/data/com.termux/files/usr

          export deps="/data/data/com.termux/files/usr"
          export HOST_SCANNER=$(which wayland-scanner)
          
          # Inject Missing Wayland/EGL/xkbcommon Headers into Target Sysroot
          mkdir -p $deps/include/EGL $deps/include/wayland-client $deps/include/xkbcommon $deps/share/wayland-protocols
                        
          mkdir -p $deps/lib/pkgconfig
          mkdir -p $deps/share/pkgconfig
          
          export HOST_WAYLAND_SCANNER=$(which wayland-scanner)

          # Wayland Stubs 
          cat > "$deps/lib/pkgconfig/wayland-client.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-client
          Description: Wayland client bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-client -lffi -landroid-shmem
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/lib/pkgconfig/wayland-egl.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-egl
          Description: Wayland EGL bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-egl
          Cflags: -I\${includedir}
          EOF

          

      - name: Stage Wayland and XKB headers for Android target
        run: |
          deps="/data/data/com.termux/files/usr"
          sudo mkdir -p "$deps/include/xkbcommon" "$deps/include/wayland"

          # Copy host Wayland and XKB headers (including xkbcommon-rxkb.h)
          #sudo cp -f /usr/include/wayland*.h "$deps/include/" 2>/dev/null || true
          #sudo cp -rf /usr/include/xkbcommon/* "$deps/include/xkbcommon/"
          sudo chmod -R a+rX "$deps/include"
          
      
      - name: Install libandroid-shmem and libandroid-spawn
        run: |
          cd /tmp
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn_0.3_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem-static_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn-static_0.3_aarch64.deb

          for deb in *.deb; do
            ar x "$deb"
            sudo tar -xf data.tar.* -C / \
              --no-overwrite-dir \
              --no-same-owner \
              --no-same-permissions
            rm -f data.tar.* debian-binary control.tar.*
          done

          sudo chmod -R 755 /data/data/com.termux/files/usr/lib
          sudo chmod -R 755 /data/data/com.termux/files/usr/include
          sudo chmod 644 /data/data/com.termux/files/usr/lib/libandroid-*.so 2>/dev/null || true
          sudo chmod 644 /data/data/com.termux/files/usr/lib/libandroid-*.a 2>/dev/null || true

      - name: Build Wine tools (host)
        run: |
          cd source
          rm -rf libs/vkd3d || true
          git clone --depth 1 --branch proton_10.0 https://github.com/AndreVto/proton-wine.git /tmp/ntdll_patch
          cp -r /tmp/ntdll_patch/libs/vkd3d libs/
          rm -rf /tmp/ntdll_patch
          export PATH="/opt/${LLVMMINGW_NAME}/bin:$PATH"
          if [ ! -f ./configure ]; then
            ./autogen.sh || true
          fi

          mkdir -p wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-wayland --without-vulkan --without-gstreamer 
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      - name: Build Wine (ARM64EC + aarch64 + i386) Wayland Native
        run: |
          cd source
          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${LLVMMINGW_NAME}/bin"
          export deps="/data/data/com.termux/files/usr"
          export SYSROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          export SDKVER="28"
          export TARGET="aarch64-linux-android"
          export install_prefix="$WORKDIR/wine-build"
          export winetools_dir="./wine-tools"

          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AS="$CC"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export DLLTOOL="$LLVM_MINGW_TOOLCHAIN/llvm-dlltool"

          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export ACLOCAL_PATH="$deps/lib/aclocal:$deps/share/aclocal"
          export CPPFLAGS="-I$deps/include -I$deps/include/EGL -I$deps/include/wayland-client -I$deps/include/xkbcommon --sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          
          export CFLAGS="-O2 -pipe -D__aarch64__"  
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib"          
          export LIBRARY_PATH="$deps/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          
          export FFMPEG_CFLAGS="-I$deps/include/libavutil -I$deps/include/libavcodec -I$deps/include/libavformat"
          export FFMPEG_LIBS="-L$deps/lib -lavutil -lavcodec -lavformat"

          # Wayland & Input autoconf overrides
          export ac_cv_lib_wayland_client_wl_display_connect=yes
          export ac_cv_lib_wayland_server_wl_display_init_shm=yes
          export ac_cv_lib_wayland_egl_wl_egl_window_create=yes
          export ac_cv_lib_wayland_cursor_wl_cursor_theme_load=yes
          export ac_cv_lib_xkbcommon_xkb_context_new=yes
          export ac_cv_lib_xkbregistry_rxkb_context_new=yes

          export ac_cv_header_wayland_client_h=yes
          export ac_cv_header_wayland_egl_h=yes
          export ac_cv_header_wayland_cursor_h=yes
          export ac_cv_header_xkbcommon_xkbcommon_h=yes
          export ac_cv_header_xkbcommon_xkbregistry_h=yes

          export ac_cv_prog_wayland_scanner=$(which wayland-scanner)
          export ac_cv_lib_soname_wayland_client=libwayland-client.so
          export ac_cv_lib_soname_wayland_egl=libwayland-egl.so
          export ac_cv_lib_soname_wayland_cursor=libwayland-cursor.so
          export ac_cv_lib_soname_xkbcommon=libxkbcommon.so
          export ac_cv_lib_soname_xkbregistry=libxkbregistry.so

          export WAYLAND_SCANNER="$(which wayland-scanner)"
          export WAYLAND_PROTOCOLS_DATADIR="$deps/share/wayland-protocols"
          export WAYLAND_CLIENT_CFLAGS="-I$deps/include -D__ANDROID__ -DHAVE_SHM_UTILS"
          export WAYLAND_CLIENT_LIBS="-L$deps/lib -lwayland-client -lffi -landroid-shmem"
          export WAYLAND_EGL_CFLAGS="-I$deps/include"
          export WAYLAND_EGL_LIBS="-L$deps/lib -lwayland-egl"
          export WAYLAND_CURSOR_CFLAGS="-I$deps/include"
          export WAYLAND_CURSOR_LIBS="-L$deps/lib -lwayland-cursor"
          export XKBCOMMON_CFLAGS="-I$deps/include"
          export XKBCOMMON_LIBS="-L$deps/lib -lxkbcommon"
          export XKBREGISTRY_CFLAGS="-I$deps/include"
          export XKBREGISTRY_LIBS="-L$deps/lib -lxkbregistry"

          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${LLVMMINGW_NAME}/bin"
          export deps="/data/data/com.termux/files/usr"
          export TARGET="aarch64-linux-android"
          export SDKVER="28"
          export install_prefix="$WORKDIR/wine-build"

          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"

          # Include target header paths AND force HAVE_XKBCOMMON_XKBCOMMON_RXKB_H
          export CFLAGS="-O2 -pipe -D__aarch64__ -I$deps/include -DHAVE_XKBCOMMON_XKBCOMMON_RXKB_H=1 -DHAVE_XKBCOMMON_XKBCOMMON_H=1"
          export CPPFLAGS="-I$deps/include -DHAVE_XKBCOMMON_XKBCOMMON_RXKB_H=1 -DHAVE_XKBCOMMON_XKBCOMMON_H=1"
          export LDFLAGS="-L$deps/lib"

          export CFLAGS="-O2 -pipe -D__aarch64__ -I$deps/include -DHAVE_XKBCOMMON_XKBCOMMON_RXKB_H=1 -DHAVE_XKBCOMMON_XKBCOMMON_H=1 $CFLAGS"
          export CPPFLAGS="-I$deps/include -DHAVE_XKBCOMMON_XKBCOMMON_RXKB_H=1 -DHAVE_XKBCOMMON_XKBCOMMON_H=1 $CPPFLAGS"


          ./configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=${install_prefix} \
            --host=${TARGET}${SDKVER} \
            --with-mingw=clang \
            --with-wine-tools="$winetools_dir" \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --without-alsa \
            --without-gstreamer \
            --without-ffmpeg \
            --disable-win16 \
            --disable-opencl \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --with-wayland \
            --without-x \
            --without-xshm \
            --without-xshape \
            --without-xfixes \
            --without-xcursor \
            --without-xrandr \
            --without-xrender \
            --without-xinerama \
            --without-xxf86vm \
            --with-vulkan \
            --with-vkd3d \
            --disable-amd_ags_x64 \
            --without-amd_ags_x64 \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install -j$(nproc)

          ls -la "$install_prefix/"

      - name: Strip binaries and clean up
        run: |
          cd wine-build
          rm -rf share/man share/doc
          cd ..

      - name: Package Wine
        run: |
          cd wine-build
          tar -cJf ../wine-termux-arm64ec.tar.xz .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-wayland-${{ env.WINE_SOURCE_NAME }}-${{ env.COMMIT_HASH }}
          path: wine-termux-arm64ec.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-wayland-${{ env.WINE_SOURCE_NAME }}-${{ env.COMMIT_HASH }}-${{ github.run_id }}
          name: Wine Wayland ${{ env.WINE_SOURCE_NAME }} (${{ env.COMMIT_HASH }}) for Termux (ARM64EC + aarch64 + i386)
          body: |
            **Wine hybrid WoW64 with ARM64EC support for Termux (Native Wayland)**
            - Source: ${{ env.WINE_SOURCE_NAME }}
            - Commit: ${{ env.COMMIT_HASH }}
            - Backend: Wayland Native (No X11)
            - Audio: PulseAudio
            - LLVM MinGW 20251202 (includes ARM64EC toolchain)
            - Extract to `/data/data/com.termux/files/usr`
          files: wine-termux-arm64ec.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
