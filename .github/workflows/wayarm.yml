name: all Wine + patch ready for Termux (Wayland Native)

on:
  push:
    branches: [ bleeding-edge ]
  workflow_dispatch:
    inputs:
      wine_source:
        description: 'Wine source repository'
        required: true
        default: 'winearm64ec'
        type: choice
        options:
          - proton
          - staging
          - winearm64ec
          - hangover
          - longjunyu2-custom-9.16
      wine_version:
        description: 'Wine version (tag, branch, or commit; leave empty for default)'
        required: false
        default: ''
        type: string
      enable_patches:
        description: 'Apply Termux/Android compatibility patches'
        required: true
        default: true
        type: boolean

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Clone Wine source
        run: |
          WINE_SOURCE="${{ github.event.inputs.wine_source || 'longjunyu2-custom-9.16' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || '' }}"

          case "$WINE_SOURCE" in
            proton)
              REPO="https://github.com/ValveSoftware/wine.git"
              BRANCH="proton_10.0"
              ;;
            staging)
              REPO="https://github.com/Pipetto-crypto/wine.git"
              BRANCH="proton-9.0-arm64ec"
              ;;
            winearm64ec)
              REPO="https://github.com/xodiosx/Wine-arm64ce.git"
              BRANCH="bleeding-edge"
              ;;
            hangover)
              REPO="https://github.com/AndreRH/hangover.git"
              BRANCH="arm64ec"
              ;;
            longjunyu2-custom-9.16)
              REPO="https://github.com/longjunyu2/wine-custom.git"
              BRANCH="custom-wine-9.16"
              ;;
            *)
              echo "❌ Unknown source: $WINE_SOURCE"
              exit 1
              ;;
          esac

          git clone -b "$BRANCH" "$REPO" source
          cd source
          git submodule update --init --recursive
          if [ -d wine ]; then
            mv -f wine/* ../
          fi

          if [ -n "$WINE_VERSION" ]; then
            git fetch --tags --all
            git checkout "$WINE_VERSION" || { echo "❌ Failed to checkout $WINE_VERSION"; exit 1; }
          fi

          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "WINE_SOURCE_NAME=$WINE_SOURCE" >> $GITHUB_ENV

      - name: Apply Termux and Android compatibility patches
        if: ${{ github.event.inputs.enable_patches != 'false' }}
        run: |
          cd source

          # 1. Replace /tmp with Termux tmp directory
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec grep -l "/tmp" {} \; 2>/dev/null | \
            xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true

          # 2. Fix InterlockedOr casting
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            sed -i 's/LONG dummy/long dummy/g' "$FILE"
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
          fi

          # 3. Clean wdscore.spec stubs
          FILE3="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE3" ] && grep -q '@ stub' "$FILE3"; then
            sed -i '/CDynamicArray/d' "$FILE3"
          fi

          # 4. Fix virtual.c for Android limits
          FILE="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE" ]; then
            sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"
            sed -i 's/_limit.*0x7fffffff0000/_limit = (void *)0x7fffff0000/g' "$FILE"
            sed -i 's/use_kernel_writewatch = 1;/use_kernel_writewatch = 0;/g' "$FILE"
            sed -i 's/uffd_fd = syscall( __NR_userfaultfd/uffd_fd = -1; \/\/ syscall( __NR_userfaultfd/g' "$FILE"
            sed -i '/static void kernel_writewatch_init(void)/{n;s/^{/{\n    return;/}' "$FILE"
          fi

          # 5. Patch loader.c
          FILE_LOADER="dlls/ntdll/loader.c"
          if [ -f "$FILE_LOADER" ]; then
            sed -i 's/ULONG buffer\[16\];/ULONG buffer\[32\];/g' "$FILE_LOADER"
            sed -i 's/base = (char \*)nt->OptionalHeader.ImageBase;/if (nt->OptionalHeader.Magic == IMAGE_NT_OPTIONAL_HDR64_MAGIC) base = (char *)((const IMAGE_NT_HEADERS64 *)nt)->OptionalHeader.ImageBase; else base = (char *)(UINT_PTR)((const IMAGE_NT_HEADERS32 *)nt)->OptionalHeader.ImageBase;/g' "$FILE_LOADER"
          fi
          FILE_LOADER_UNIX="dlls/ntdll/unix/loader.c"
          if [ -f "$FILE_LOADER_UNIX" ]; then
            sed -i 's/^\(\s*\)mallopt( M_PERTURB, 0xff );/\1\/\/ mallopt( M_PERTURB, 0xff );/g' "$FILE_LOADER_UNIX"
            sed -i 's/^\(\s*\)mallopt( M_PERTURB, 0 );/\1\/\/ mallopt( M_PERTURB, 0 );/g' "$FILE_LOADER_UNIX"
          fi

          # 6. Patch wine.inf for FEX libraries
          INF="loader/wine.inf.in"
          if [ -f "$INF" ] && ! grep -q 'libarm64ecfex.dll' "$INF"; then
            sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"
            sed -i 's/xtajit\.dll/libwow64fex.dll/g' "$INF"
          fi

          # 7. Vulkan VRAM faking
          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/p_vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                  uint32_t k; \
                  for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                      if (object->memory_properties.memoryHeaps[k].flags \& VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                          object->memory_properties.memoryHeaps[k].size = s; \
              }' "$FILE"
          fi

          # 8. Add PulseAudio link flag natively
          FILE_PULSE_MK="dlls/winepulse.drv/Makefile.in"
          if [ -f "$FILE_PULSE_MK" ] && ! grep -q -- '-lpulse' "$FILE_PULSE_MK"; then
            sed -i 's/UNIX_LIBS    = $(PULSE_LIBS) $(PTHREAD_LIBS) -lm/UNIX_LIBS    = $(PULSE_LIBS) $(PTHREAD_LIBS) -lm -lpulse/' "$FILE_PULSE_MK"
          fi

          # 9. Replace xtajit with FEX library names globally
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/xtajit\.dll/libwow64fex.dll/g' {} +

          # 10. Update ntdll architecture strings
          find dlls/ntdll -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|x86_64-windows|aarch64-windows|g' {} +

          # 11. Vulkan latency control patch
          FILE_VULKAN_H="include/wine/vulkan_driver.h"
          if [ -f "$FILE_VULKAN_H" ] && ! grep -q "low_latency_enabled" "$FILE_VULKAN_H"; then
            sed -i '/keyed_mutexes_enabled;/a \    BOOL low_latency_enabled;\n    BOOL use_standard_latency;' "$FILE_VULKAN_H"
            sed -i '/PFN_vkQueuePresentKHR p_vkQueuePresentKHR;/a \    PFN_vkSetLatencySleepModeNV p_vkSetLatencySleepModeNV;\n    PFN_vkWaitForPresentKHR p_vkWaitForPresentKHR;' "$FILE_VULKAN_H"
          fi

          FILE_VULKAN_C="dlls/win32u/vulkan.c"
          if [ -f "$FILE_VULKAN_C" ] && ! grep -q "win32u_vkSetLatencySleepModeNV" "$FILE_VULKAN_C"; then
            FUNC_DEF="static VkResult win32u_vkSetLatencySleepModeNV(VkDevice device, VkSwapchainKHR swapchain, const VkLatencySleepModeInfoNV *pSleepModeInfo) { VkLatencySleepModeInfoNV host; struct vulkan_device *vk_dev = vulkan_device_from_handle(device); struct swapchain *vk_sw = swapchain_from_handle(swapchain); vk_dev->low_latency_enabled = pSleepModeInfo->lowLatencyMode; vk_dev->use_standard_latency = pSleepModeInfo->lowLatencyMode; host.sType = VK_STRUCTURE_TYPE_LATENCY_SLEEP_MODE_INFO_NV; host.pNext = NULL; host.lowLatencyMode = pSleepModeInfo->lowLatencyMode; host.lowLatencyBoost = pSleepModeInfo->lowLatencyBoost; host.minimumIntervalUs = pSleepModeInfo->minimumIntervalUs; return vk_dev->p_vkSetLatencySleepModeNV(vk_dev->host.device, vk_sw->obj.host.swapchain, &host); }\\n\\nstatic void win32u_apply_standard_latency(struct vulkan_device *dev, VkSwapchainKHR sw, uint64_t id) { if (dev->p_vkWaitForPresentKHR) dev->p_vkWaitForPresentKHR(dev->host.device, sw, id, 1000000000); }\\n\\n#define win32u_vk_find_struct(s, t) win32u_vk_find_struct_((void *)s, VK_STRUCTURE_TYPE_##t)\\nstatic void *win32u_vk_find_struct_(void *s, VkStructureType t) { VkBaseOutStructure *h; for (h = s; h; h = h->pNext) { if (h->sType == t) return h; } return NULL; }\\n"
            sed -i "/static VkResult win32u_vkCreateSwapchainKHR/i $FUNC_DEF" "$FILE_VULKAN_C"
            sed -i '/VkPipelineStageFlags waitStage/a \        VkLatencySubmissionPresentIdNV latencySubmitInfo;\n        VkPresentIdKHR *present_id;' "$FILE_VULKAN_C"
            QUEUE_LOGIC="        if ((present_id = win32u_vk_find_struct(&present_info_host, PRESENT_ID_KHR))) { if (queue->device->low_latency_enabled) { latencySubmitInfo.sType = VK_STRUCTURE_TYPE_LATENCY_SUBMISSION_PRESENT_ID_NV; latencySubmitInfo.pNext = NULL; latencySubmitInfo.presentID = *present_id->pPresentIds; submitInfo.pNext = &latencySubmitInfo; } if (queue->device->use_standard_latency) win32u_apply_standard_latency(queue->device, present_info->pSwapchains[0], *present_id->pPresentIds); }"
            sed -i "/submitInfo.pSignalSemaphores = &blit_sema;/a $QUEUE_LOGIC" "$FILE_VULKAN_C"
            sed -i '/.p_get_host_surface_extension = win32u_get_host_surface_extension,/a \    .p_vkSetLatencySleepModeNV = win32u_vkSetLatencySleepModeNV,' "$FILE_VULKAN_C"
          fi

          # 12. External Proton Patches
          PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"
          for i in 1 2 8 ; do
            wget -q -O "${i}.patch" "${PATCH_BASE}/${i}.patch"
            if git apply --check "${i}.patch" 2>/dev/null; then
              git apply --whitespace=fix "${i}.patch"
            elif git apply --3way --check "${i}.patch" 2>/dev/null; then
              git apply --3way --whitespace=fix "${i}.patch"
            fi
          done

          # 13. SHM Fallbacks for Bionic
          for f in dlls/ntdll/unix/fsync.c dlls/ntdll/unix/esync.c; do
            [ -f "$f" ] && sed -i '/^#include "unix_private.h"/a #ifdef __ANDROID__\n#include "android/shm_utils/shm_utils.h"\n#endif' "$f"
          done
          for f in server/esync.c server/fsync.c; do
            [ -f "$f" ] && sed -i '/^#include "config.h"/a #ifdef __ANDROID__\n#include "android/shm_utils/shm_utils.h"\n#endif' "$f"
          done

      - name: Create Android SHM headers
        if: ${{ github.event.inputs.enable_patches != 'false' }}       
        run: |
          cd source
          mkdir -p android/shm_utils
          cat << 'EOF' > android/shm_utils/shm_utils.h
          #ifndef __WINE_SERVER_SHM_UTILS_H
          #define __WINE_SERVER_SHM_UTILS_H

          #ifdef __ANDROID__
          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/stat.h>

          static inline int shm_open(const char *name, int oflag, mode_t mode)
          {
              char *tmpdir = getenv("TMPDIR") ? getenv("TMPDIR") : "/data/data/com.termux/files/usr/tmp";
              char *fname;
              if (asprintf(&fname, "%s/%s", tmpdir, name) == -1) return -1;
              int fd = open(fname, oflag, mode);
              free(fname);
              return fd;
          }

          static inline int shm_unlink(const char *name)
          {
              char *tmpdir = getenv("TMPDIR") ? getenv("TMPDIR") : "/data/data/com.termux/files/usr/tmp";
              char *fname;
              if (asprintf(&fname, "%s/%s", tmpdir, name) == -1) return -1;
              int ret = unlink(fname);
              free(fname);
              return ret;
          }
          #endif /* __ANDROID__ */

          #endif /* __WINE_SERVER_SHM_UTILS_H */
          EOF

          mkdir -p android/android_sysvshm/sys
          cat << 'EOF' > android/android_sysvshm/sys/shm.h
          #ifndef _SYS_SHM_H
          #define _SYS_SHM_H 1
          #include <stdint.h>
          #include <sys/types.h>
          #include <sys/ipc.h>
          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/stat.h>
          #ifdef __cplusplus
          extern "C" {
          #endif
          #define IPC_CREAT   01000
          #define IPC_EXCL    02000
          #define IPC_NOWAIT  04000
          #define IPC_RMID    0
          #define IPC_SET     1
          #define IPC_STAT    2
          #define IPC_INFO    3
          #define IPC_PRIVATE ((key_t) 0)
          #define SHM_R       0400
          #define SHM_W       0200
          #define SHM_RDONLY  010000
          #define SHM_RND     020000
          #define SHM_REMAP   040000
          #define SHM_EXEC    0100000
          #define SHM_LOCK    11
          #define SHM_UNLOCK  12
          typedef unsigned long int shmatt_t;
          typedef long int __long_time_t;
          struct debian_ipc_perm { key_t __key; __uid_t uid; __gid_t gid; __uid_t cuid; __gid_t cgid; unsigned short int mode; unsigned short int __pad1; unsigned short int __seq; unsigned short int __pad2; unsigned long int __unused1; unsigned long int __unused2; };
          struct shmid_ds { struct debian_ipc_perm shm_perm; size_t shm_segsz; __long_time_t shm_atime; unsigned long int __unused1; __long_time_t shm_dtime; unsigned long int __unused2; __long_time_t shm_ctime; unsigned long int __unused3; __pid_t shm_cpid; __pid_t shm_lpid; shmatt_t shm_nattch; unsigned long int __unused4; unsigned long int __unused5; };
          extern int shmctl(int __shmid, int __cmd, struct shmid_ds *__buf);
          extern int shmget(key_t __key, size_t __size, int __shmflg);
          extern void *shmat(int __shmid, const void *__shmaddr, int __shmflg);
          extern int shmdt(const void *__shmaddr);
          #ifdef __cplusplus
          }
          #endif
          #endif /* _SYS_SHM_H */
          EOF

          mkdir -p dlls/ntdll/unix/android/shm_utils
          ln -sf ../../../../../android/shm_utils/shm_utils.h dlls/ntdll/unix/android/shm_utils/shm_utils.h          
          mkdir -p server/android/shm_utils
          ln -sf ../../../android/shm_utils/shm_utils.h server/android/shm_utils/shm_utils.h

      - name: Install host dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev libfreetype-dev:i386 libfontconfig-dev:i386 \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev \
            libasound2-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libglib2.0-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup LLVM MinGW (with ARM64EC support)
        run: |
          sudo mkdir -p /opt
          cd /opt
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVMMINGW_DATE}/${LLVMMINGW_NAME}.tar.xz"
          sudo wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 "$URL" -O llvm-mingw.tar.xz
          sudo tar -xJf llvm-mingw.tar.xz
          sudo rm llvm-mingw.tar.xz
          echo "/opt/${LLVMMINGW_NAME}/bin" >> $GITHUB_PATH

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Termux sysroot and Wayland Stubs
        run: |
          mkdir termux && cd termux
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/wine-14/termux-rootfs.tar
          tar xf termux-rootfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          sudo chmod -R a+rX /data/data/com.termux/files/usr

          export deps="/data/data/com.termux/files/usr"
          export HOST_SCANNER=$(which wayland-scanner)
          
          # Inject Missing Wayland/EGL/xkbcommon Headers into Target Sysroot
          mkdir -p $deps/include/EGL $deps/include/wayland-client $deps/include/xkbcommon $deps/share/wayland-protocols
          
          cat << 'EOF' > $deps/include/EGL/egl.h
          #ifndef __EGL_H__
          #define __EGL_H__
          #include <EGL/eglplatform.h>
          typedef void *EGLDisplay;
          typedef void *EGLSurface;
          typedef void *EGLContext;
          typedef void *EGLConfig;
          typedef unsigned int EGLBoolean;
          typedef int EGLint;
          #endif
          EOF

          cat << 'EOF' > $deps/include/EGL/eglplatform.h
          #ifndef __EGL_PLATFORM_H__
          #define __EGL_PLATFORM_H__
          typedef struct wl_display *EGLNativeDisplayType;
          typedef struct wl_egl_window *EGLNativeWindowType;
          typedef void *EGLNativePixmapType;
          #endif
          EOF

          cat << 'EOF' > $deps/include/wayland-egl.h
          #ifndef WAYLAND_EGL_H
          #define WAYLAND_EGL_H
          struct wl_surface;
          struct wl_egl_window {
              struct wl_surface *surface;
              int width;
              int height;
          };
          #ifdef __cplusplus
          extern "C" {
          #endif
          struct wl_egl_window *wl_egl_window_create(struct wl_surface *surface, int width, int height);
          void wl_egl_window_destroy(struct wl_egl_window *window);
          void wl_egl_window_resize(struct wl_egl_window *window, int width, int height, int dx, int dy);
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF

          cat << 'EOF' > $deps/include/wayland-client.h
          #ifndef WAYLAND_CLIENT_H
          #define WAYLAND_CLIENT_H
          #include <wayland-client-core.h>
          #endif
          EOF

          cat << 'EOF' > $deps/include/wayland-client-core.h
          #ifndef WAYLAND_CLIENT_CORE_H
          #define WAYLAND_CLIENT_CORE_H
          struct wl_display;
          struct wl_proxy;
          #ifdef __cplusplus
          extern "C" {
          #endif
          struct wl_display *wl_display_connect(const char *name);
          void wl_display_disconnect(struct wl_display *display);
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF

          cat << 'EOF' > $deps/include/wayland-cursor.h
          #ifndef WAYLAND_CURSOR_H
          #define WAYLAND_CURSOR_H
          struct wl_cursor_theme;
          struct wl_cursor_theme *wl_cursor_theme_load(const char *name, int size, struct wl_shm *shm);
          #endif
          EOF

          cat << 'EOF' > $deps/include/xkbcommon/xkbcommon.h
          #ifndef _XKBCOMMON_H
          #define _XKBCOMMON_H
          struct xkb_context;
          struct xkb_context *xkb_context_new(int flags);
          #endif
          EOF

          cat << 'EOF' > $deps/include/xkbcommon/xkbregistry.h
          #ifndef _XKBREGISTRY_H
          #define _XKBREGISTRY_H
          struct rxkb_context;
          struct rxkb_context *rxkb_context_new(int flags);
          #endif
          EOF

          mkdir -p $deps/lib/pkgconfig
          mkdir -p $deps/share/pkgconfig
          
          cat << EOF > $deps/lib/pkgconfig/wayland-scanner.pc
          prefix=$deps
          exec_prefix=\${prefix}
          bindir=\${exec_prefix}/bin
          wayland_scanner=$HOST_SCANNER
          Name: Wayland Scanner
          Description: Wayland scanner stub redirecting to host for cross-compilation
          Version: 1.22.0
          EOF
          cp $deps/lib/pkgconfig/wayland-scanner.pc $deps/share/pkgconfig/wayland-scanner.pc
          
          cat > "$deps/lib/pkgconfig/wayland-client.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-client
          Description: Wayland client bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-client -lffi -landroid-shmem
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/lib/pkgconfig/wayland-egl.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-egl
          Description: Wayland EGL bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-egl
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/lib/pkgconfig/wayland-cursor.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: wayland-cursor
          Description: Wayland cursor bionic lib
          Version: 1.22.0
          Libs: -L\${libdir} -lwayland-cursor
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/share/pkgconfig/wayland-protocols.pc" << EOF
          prefix=$deps
          datarootdir=\${prefix}/share
          pkgdatadir=\${datarootdir}/wayland-protocols
          Name: Wayland Protocols
          Description: Wayland protocol files
          Version: 1.32
          EOF

          cat > "$deps/lib/pkgconfig/xkbcommon.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: xkbcommon
          Description: XKB API stub
          Version: 1.5.0
          Libs: -L\${libdir} -lxkbcommon
          Cflags: -I\${includedir}
          EOF

          cat > "$deps/lib/pkgconfig/xkbregistry.pc" << EOF
          prefix=$deps
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: xkbregistry
          Description: XKB Registry API stub
          Version: 1.5.0
          Libs: -L\${libdir} -lxkbregistry
          Cflags: -I\${includedir}
          EOF

      - name: Stage Wayland and XKB headers for Android target
        run: |
          deps="/data/data/com.termux/files/usr"
          sudo mkdir -p "$deps/include/xkbcommon" "$deps/include/wayland"

          # Copy host Wayland and XKB headers (including xkbcommon-rxkb.h)
          sudo cp -f /usr/include/wayland*.h "$deps/include/" 2>/dev/null || true
          sudo cp -rf /usr/include/xkbcommon/* "$deps/include/xkbcommon/"
          sudo chmod -R a+rX "$deps/include"
          
      
      - name: Install libandroid-shmem and libandroid-spawn
        run: |
          cd /tmp
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn_0.3_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem-static_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn-static_0.3_aarch64.deb

          for deb in *.deb; do
            ar x "$deb"
            sudo tar -xf data.tar.* -C / \
              --no-overwrite-dir \
              --no-same-owner \
              --no-same-permissions
            rm -f data.tar.* debian-binary control.tar.*
          done

          sudo chmod -R 755 /data/data/com.termux/files/usr/lib
          sudo chmod -R 755 /data/data/com.termux/files/usr/include
          sudo chmod 644 /data/data/com.termux/files/usr/lib/libandroid-*.so 2>/dev/null || true
          sudo chmod 644 /data/data/com.termux/files/usr/lib/libandroid-*.a 2>/dev/null || true

      - name: Build Wine tools (host)
        run: |
          cd source
          rm -rf libs/vkd3d || true
          git clone --depth 1 --branch proton_10.0 https://github.com/AndreVto/proton-wine.git /tmp/ntdll_patch
          cp -r /tmp/ntdll_patch/libs/vkd3d libs/
          rm -rf /tmp/ntdll_patch
          export PATH="/opt/${LLVMMINGW_NAME}/bin:$PATH"
          if [ ! -f ./configure ]; then
            ./autogen.sh || true
          fi

          mkdir -p wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-wayland --without-vulkan --without-gstreamer 
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      - name: Build Wine (ARM64EC + aarch64 + i386) Wayland Native
        run: |
          cd source
          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${LLVMMINGW_NAME}/bin"
          export deps="/data/data/com.termux/files/usr"
          export SYSROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          export SDKVER="28"
          export TARGET="aarch64-linux-android"
          export install_prefix="$WORKDIR/wine-build"
          export winetools_dir="./wine-tools"

          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AS="$CC"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export DLLTOOL="$LLVM_MINGW_TOOLCHAIN/llvm-dlltool"

          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export ACLOCAL_PATH="$deps/lib/aclocal:$deps/share/aclocal"
          export CPPFLAGS="-I$deps/include -I$deps/include/EGL -I$deps/include/wayland-client -I$deps/include/xkbcommon --sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          
          export CFLAGS="-O2 -pipe -D__aarch64__"  
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib"          
          export LIBRARY_PATH="$deps/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          
          export FFMPEG_CFLAGS="-I$deps/include/libavutil -I$deps/include/libavcodec -I$deps/include/libavformat"
          export FFMPEG_LIBS="-L$deps/lib -lavutil -lavcodec -lavformat"

          # Wayland & Input autoconf overrides
          export ac_cv_lib_wayland_client_wl_display_connect=yes
          export ac_cv_lib_wayland_server_wl_display_init_shm=yes
          export ac_cv_lib_wayland_egl_wl_egl_window_create=yes
          export ac_cv_lib_wayland_cursor_wl_cursor_theme_load=yes
          export ac_cv_lib_xkbcommon_xkb_context_new=yes
          export ac_cv_lib_xkbregistry_rxkb_context_new=yes

          export ac_cv_header_wayland_client_h=yes
          export ac_cv_header_wayland_egl_h=yes
          export ac_cv_header_wayland_cursor_h=yes
          export ac_cv_header_xkbcommon_xkbcommon_h=yes
          export ac_cv_header_xkbcommon_xkbregistry_h=yes

          export ac_cv_prog_wayland_scanner=$(which wayland-scanner)
          export ac_cv_lib_soname_wayland_client=libwayland-client.so
          export ac_cv_lib_soname_wayland_egl=libwayland-egl.so
          export ac_cv_lib_soname_wayland_cursor=libwayland-cursor.so
          export ac_cv_lib_soname_xkbcommon=libxkbcommon.so
          export ac_cv_lib_soname_xkbregistry=libxkbregistry.so

          export WAYLAND_SCANNER="$(which wayland-scanner)"
          export WAYLAND_PROTOCOLS_DATADIR="$deps/share/wayland-protocols"
          export WAYLAND_CLIENT_CFLAGS="-I$deps/include -D__ANDROID__ -DHAVE_SHM_UTILS"
          export WAYLAND_CLIENT_LIBS="-L$deps/lib -lwayland-client -lffi -landroid-shmem"
          export WAYLAND_EGL_CFLAGS="-I$deps/include"
          export WAYLAND_EGL_LIBS="-L$deps/lib -lwayland-egl"
          export WAYLAND_CURSOR_CFLAGS="-I$deps/include"
          export WAYLAND_CURSOR_LIBS="-L$deps/lib -lwayland-cursor"
          export XKBCOMMON_CFLAGS="-I$deps/include"
          export XKBCOMMON_LIBS="-L$deps/lib -lxkbcommon"
          export XKBREGISTRY_CFLAGS="-I$deps/include"
          export XKBREGISTRY_LIBS="-L$deps/lib -lxkbregistry"

          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${LLVMMINGW_NAME}/bin"
          export deps="/data/data/com.termux/files/usr"
          export TARGET="aarch64-linux-android"
          export SDKVER="28"
          export install_prefix="$WORKDIR/wine-build"

          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"

          # IMPORTANT: Include -I$deps/include in CFLAGS and CPPFLAGS
          export CFLAGS="-O2 -pipe -D__aarch64__ -I$deps/include"
          export CPPFLAGS="-I$deps/include"
          export LDFLAGS="-L$deps/lib"
          




          ./configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=${install_prefix} \
            --host=${TARGET}${SDKVER} \
            --with-mingw=clang \
            --with-wine-tools="$winetools_dir" \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --without-alsa \
            --without-gstreamer \
            --without-ffmpeg \
            --disable-win16 \
            --disable-opencl \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --with-wayland \
            --without-x \
            --without-xshm \
            --without-xshape \
            --without-xfixes \
            --without-xcursor \
            --without-xrandr \
            --without-xrender \
            --without-xinerama \
            --without-xxf86vm \
            --with-vulkan \
            --with-vkd3d \
            --disable-amd_ags_x64 \
            --without-amd_ags_x64 \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install -j$(nproc)

          ls -la "$install_prefix/"

      - name: Strip binaries and clean up
        run: |
          cd wine-build
          rm -rf share/man share/doc
          cd ..

      - name: Package Wine
        run: |
          cd wine-build
          tar -cJf ../wine-termux-arm64ec.tar.xz .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-wayland-${{ env.WINE_SOURCE_NAME }}-${{ env.COMMIT_HASH }}
          path: wine-termux-arm64ec.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-wayland-${{ env.WINE_SOURCE_NAME }}-${{ env.COMMIT_HASH }}-${{ github.run_id }}
          name: Wine Wayland ${{ env.WINE_SOURCE_NAME }} (${{ env.COMMIT_HASH }}) for Termux (ARM64EC + aarch64 + i386)
          body: |
            **Wine hybrid WoW64 with ARM64EC support for Termux (Native Wayland)**
            - Source: ${{ env.WINE_SOURCE_NAME }}
            - Commit: ${{ env.COMMIT_HASH }}
            - Backend: Wayland Native (No X11)
            - Audio: PulseAudio
            - LLVM MinGW 20251202 (includes ARM64EC toolchain)
            - Extract to `/data/data/com.termux/files/usr`
          files: wine-termux-arm64ec.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
