name: xWine script mz ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source (from upstream-arm64ec branch)
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

    

      - name: Install required deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-multilib flex bison \
            gcc-mingw-w64 libz-mingw-w64-dev \
            clang lld llvm \
            pkg-config gettext unzip \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev

      - name: Setup Termux environment
        run: |
          mkdir imagefs
          cd imagefs
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          rm termuxfs.tar
          sudo mv ./data /
          sudo chown -R $(whoami):$(whoami) /data

      - name: Setup llvm-mingw
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          sudo mv llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: false
          link-to-sdk: true

      # -------------------------------
      # Build Wine tools (host)
      # -------------------------------
      - name: Build Wine tools
        run: |
          ./autogen.sh
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-vulkan --without-gstreamer
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      # -------------------------------
      # Build Wine (Android ARM64EC)
      # -------------------------------
      - name: Build Wine ARM64EC (single pass)
        run: |
          export TOOLCHAIN="/usr/local/lib/android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW:$PATH"

          export deps="/data/data/com.termux/files/usr"

          export TARGET="aarch64-linux-android"
          export API=28

          export CC="$TOOLCHAIN/${TARGET}${API}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${API}-clang++"
          export AS=$CC
          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-O2 -s -Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"

          # 🔥 ANDROID FIX (important)
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib -landroid-shmem -landroid-spawn"
          export LIBS="-landroid-shmem -landroid-spawn"

          export LIBRARY_PATH="$deps/lib"

          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"

          mkdir build && cd build

          ../configure \
            --host=${TARGET}${API} \
            --prefix=/usr \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-win64 \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --disable-tests \
            --disable-opencl \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)

          make install DESTDIR=../wine-out

      # -------------------------------
      # Strip + cleanup (size reduction)
      # -------------------------------
      - name: Strip & cleanup
        run: |
          find wine-out -type f -executable -exec strip --strip-unneeded {} \; || true

          rm -rf wine-out/usr/include
          rm -rf wine-out/usr/share/man
          rm -rf wine-out/usr/share/doc
          rm -rf wine-out/usr/share/wine/gecko
          rm -rf wine-out/usr/share/wine/mono

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine-out/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: build/config.log
