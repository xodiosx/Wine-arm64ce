name: xWine script ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            gcc-mingw-w64 libz-mingw-w64-dev \
            clang lld llvm \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev

      # =========================
      # FIXED LLVM MINGW SETUP
      # =========================
      - name: Setup LLVM MinGW (fixed)
        run: |
          sudo mkdir -p /opt
          cd /opt

          sudo wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm.tar.xz

          sudo tar -xf llvm.tar.xz

          # 🔥 dynamically detect extracted folder
          DIR=$(tar tf llvm.tar.xz | head -1 | cut -f1 -d"/")

          echo "Detected folder: $DIR"

          sudo mv "$DIR" llvm-mingw
          sudo rm llvm.tar.xz

          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      # =========================
      # Android NDK
      # =========================
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # Termux sysroot
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir termux && cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          cp termuxfs.tar ../termux-rootfs.tar

      # =========================
      # VRAM PATCH ONLY
      # =========================
      - name: Apply VRAM patch
        run: |
          FILE="dlls/winevulkan/vulkan.c"
          [ -f "$FILE" ] && sed -i '/vkGetPhysicalDeviceMemoryProperties/a \
          { const char *v=getenv("WINE_VRAM_SIZE"); uint64_t s=v?(uint64_t)atoll(v)*1024*1024:(uint64_t)2048*1024*1024; \
          for(uint32_t i=0;i<object->memory_properties.memoryHeapCount;i++) \
          if(object->memory_properties.memoryHeaps[i].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
          object->memory_properties.memoryHeaps[i].size=s; }' "$FILE"

          FILE="dlls/wined3d/adapter_gl.c"
          [ -f "$FILE" ] && sed -i '/vidmem =/a { const char *v=getenv("WINE_VRAM_SIZE"); if(v) gl_info->vidmem=(uint64_t)atoll(v)*1024*1024; }' "$FILE"

          FILE="dlls/wined3d/adapter_vk.c"
          [ -f "$FILE" ] && sed -i '/vidmem =/a { const char *v=getenv("WINE_VRAM_SIZE"); if(v) device->adapter.vidmem=(uint64_t)atoll(v)*1024*1024; }' "$FILE"

      # =========================
      # Wine tools
      # =========================
      - name: Build Wine tools
        run: |
          ./autogen.sh
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-vulkan --without-gstreamer
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      # =========================
      # SINGLE PASS BUILD
      # =========================
      - name: Build Wine ARM64EC
        run: |
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="/opt/llvm-mingw/bin:$TOOLCHAIN:$PATH"

          export deps="/data/data/com.termux/files/usr"
          export TARGET="aarch64-linux-android"
          export API=28

          export CC="$TOOLCHAIN/${TARGET}${API}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${API}-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-O2 -s -Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"

          # 🔥 correct Android linking
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib -landroid-shmem -landroid-spawn"
          export LIBS="-landroid-shmem -landroid-spawn"

          mkdir build && cd build

          ../configure \
            --host=${TARGET}${API} \
            --prefix=/usr \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-win64 \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --disable-tests \
            --disable-opencl \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install DESTDIR=../compiled-files

      - name: Package
        run: |
          cd compiled-files
          tar -czf wine.tar.gz *
          mv wine.tar.gz ../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine.tar.gz
