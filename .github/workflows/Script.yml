name: xWine script mz ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source (from upstream-arm64ec branch)
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

    
      # =========================
      # INSTALL DEPS (MINIMAL SAFE)
      # =========================
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential git wget curl xz-utils flex bison pkg-config \
            gettext icoutils fontforge-nox \
            libx11-dev libxext-dev libxrandr-dev libxrender-dev \
            libxcursor-dev libxi-dev libxfixes-dev libxcomposite-dev \
            libxinerama-dev libxxf86vm-dev \
            libgl1-mesa-dev libvulkan-dev \
            libpulse-dev libdbus-1-dev \
            libfontconfig-dev libfreetype-dev \
            libgnutls28-dev libasound2-dev \
            llvm clang lld \
            gcc-multilib g++-multilib

      # =========================
      # TERMUX SYSROOT
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir sysroot && cd sysroot
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data

      # =========================
      # LLVM MINGW
      # =========================
      - name: Setup LLVM MinGW
        run: |
          cd /opt
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          mv llvm-mingw-* llvm-mingw
          echo "PATH=/opt/llvm-mingw/bin:$PATH" >> $GITHUB_ENV

      # =========================
      # ANDROID NDK
      # =========================
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # BUILD WINE (SCRIPT STYLE)
      # =========================
      - name: Build Wine (single-pass clean)
        run: |
          cd wine

          export WORKDIR=$(pwd)
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"

          export deps="/data/data/com.termux/files/usr"
          export ARCH="aarch64"
          export SDKVER="28"
          export TARGET="$ARCH-linux-android"

          export install_prefix="$WORKDIR/wine-out"
          export winetools_dir="$WORKDIR/wine-tools"

          export CC="$TOOLCHAIN/$TARGET$SDKVER-clang"
          export CXX="$TOOLCHAIN/$TARGET$SDKVER-clang++"
          export AR=$TOOLCHAIN/llvm-ar
          export RANLIB=$TOOLCHAIN/llvm-ranlib
          export STRIP=$TOOLCHAIN/llvm-strip
          export DLLTOOL=$LLVM_MINGW_TOOLCHAIN/llvm-dlltool

          export PKG_CONFIG_LIBDIR=$deps/lib/pkgconfig:$deps/share/pkgconfig
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-O2 -s -Wno-declaration-after-statement"
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib"

          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"

          ./autogen.sh

          # =========================
          # BUILD TOOLS FIRST
          # =========================
          mkdir build-tools && cd build-tools
          ../configure --without-x --without-vulkan
          make -j$(nproc) __tooldeps__
          cd ..

          # =========================
          # MAIN BUILD
          # =========================
          mkdir build && cd build

          ../configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=/usr \
            --host=$TARGET$SDKVER \
            --with-mingw=clang \
            --with-wine-tools=../build-tools \
            --enable-win64 \
            --disable-tests \
            --disable-win16 \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install DESTDIR=$install_prefix

          # =========================
          # STRIP + CLEAN (SIZE FIX)
          # =========================
          echo "Stripping binaries..."
          find $install_prefix -type f -exec $STRIP --strip-unneeded {} \; 2>/dev/null || true

          echo "Removing bloat..."
          rm -rf $install_prefix/usr/include
          rm -rf $install_prefix/usr/share/doc
          rm -rf $install_prefix/usr/share/man
          rm -rf $install_prefix/usr/share/wine/gecko
          rm -rf $install_prefix/usr/share/wine/mono

      # =========================
      # UPLOAD
      # =========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec-clean
          path: wine/wine-out

