name: xWine script ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential flex bison unzip pkg-config gettext \
            clang lld llvm \
            libxml-libxml-perl libssl-dev

      # =========================
      # LLVM MINGW (BYLAWS)
      # =========================
      - name: Setup LLVM MinGW
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          rm llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          sudo mv llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw

      # =========================
      # ANDROID NDK
      # =========================
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # TERMUX ROOTFS
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir termux && cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp

      # =========================
      # WINE TOOLS
      # =========================
      - name: Build Wine tools
        run: |
          ./autogen.sh
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-freetype
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      # =========================
      # BUILD WINE ARM64EC
      # =========================
      - name: Build Wine ARM64EC
        run: |
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export MINGW="/opt/llvm-mingw/bin"

          export PATH="$MINGW:$TOOLCHAIN:$PATH"

          export TARGET="aarch64-linux-android"
          export API=28
          export deps="/data/data/com.termux/files/usr"

          # Android side
          export CC="$TOOLCHAIN/${TARGET}${API}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${API}-clang++"

          # 🔥 Force correct Windows compiler
          export CC_FOR_BUILD="gcc"
          export CXX_FOR_BUILD="g++"

          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-O2 -s"

          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib -landroid-shmem -landroid-spawn"
          export LIBS="-landroid-shmem -landroid-spawn"

          mkdir build && cd build

          ../configure \
            --host=${TARGET}${API} \
            --prefix=/usr \
            --enable-archs=arm64ec,aarch64 \
            --enable-win64 \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --disable-tests \
            --disable-win16 \
            --without-freetype \
            --without-x \
            --without-wayland \
            --without-gnutls \
            --without-cups \
            --without-dbus \
            --without-alsa \
            --without-opengl \
            LDFLAGS="$LDFLAGS"

          make -j$(nproc)
          make install DESTDIR=../compiled-files

      # =========================
      # STRIP + PACKAGE
      # =========================
      - name: Package
        run: |
          cd compiled-files

          # 🔥 shrink size
          find . -name "*.a" -delete
          find . -name "*.o" -delete
          find . -type f -exec strip --strip-unneeded {} + || true

          tar -czf wine.tar.gz *
          mv wine.tar.gz ../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine.tar.gz
