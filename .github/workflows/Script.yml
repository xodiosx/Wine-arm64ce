name: xWine script ARM64EC WOW64 Termux Build

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # =========================
    # Checkout
    # =========================
    - name: Checkout source
      uses: actions/checkout@v4

    # =========================
    # Dependencies
    # =========================
    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install -y \
          build-essential gcc-multilib g++-multilib \
          flex bison pkg-config gettext \
          clang llvm lld \
          git wget curl \
          libxml-libxml-perl

    # =========================
    # LLVM MinGW (ARM64EC FIX)
    # =========================
    - name: Setup LLVM MinGW (Bylaws)
      run: |
        sudo mkdir -p /opt
        cd /opt

        wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm.tar.xz
        tar -xf llvm.tar.xz
        rm llvm.tar.xz

        DIR=$(ls -d llvm-mingw-* | head -n 1)
        sudo mv "$DIR" llvm-mingw

        echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

    # =========================
    # Android NDK
    # =========================
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28c

    # =========================
    # Wine tools (host build)
    # =========================
    - name: Build Wine tools
      run: |
        if [ ! -f configure ]; then
          ./autogen.sh
        fi

        mkdir wine-tools
        cd wine-tools

        ../configure \
          --without-x \
          --without-wayland \
          --without-vulkan \
          --without-freetype

        make -j$(nproc) __tooldeps__ nls/all

        cd ..

    # =========================
    # MAIN BUILD (FIXED CORE)
    # =========================
    - name: Build Wine ARM64EC WOW64
      run: |
        export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        export PATH="/opt/llvm-mingw/bin:$TOOLCHAIN:$PATH"

        export API=28
        export TARGET=aarch64-linux-android

        # ✅ Clean Android compiler
        export CC="$TOOLCHAIN/${TARGET}${API}-clang"
        export CXX="$TOOLCHAIN/${TARGET}${API}-clang++"

        # ❌ CRITICAL FIX: remove Termux contamination
        unset CPPFLAGS
        unset PKG_CONFIG_PATH
        unset PKG_CONFIG_LIBDIR

        export CFLAGS="-O2 -Wno-error"

        # ✅ Android compatibility (IMPORTANT)
        export LDFLAGS="-landroid-shmem -landroid-spawn"

        mkdir build && cd build

        ../configure \
          --host=${TARGET}${API} \
          --prefix=/usr \
          --enable-archs=arm64ec,aarch64,i386 \
          --enable-win64 \
          --with-mingw=clang \
          --with-wine-tools=../wine-tools \
          --without-x \
          --without-wayland \
          --without-vulkan \
          --without-freetype \
          --without-gnutls \
          --without-cups \
          --without-dbus \
          --without-alsa \
          --disable-tests

        make -j$(nproc)
        make install DESTDIR=../compiled-files

    # =========================
    # PACKAGE
    # =========================
    - name: Package
      run: |
        cd compiled-files
        tar -czf wine-arm64ec-wow64.tar.gz *
        mv wine-arm64ec-wow64.tar.gz ../

    # =========================
    # Upload
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wine-arm64ec-wow64
        path: wine-arm64ec-wow64.tar.gz
