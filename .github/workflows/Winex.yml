name: xWine mz branch ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source (from upstream-arm64ec branch)
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            gcc-mingw-w64 libz-mingw-w64-dev \
            clang lld llvm \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev

      # =========================
      # LLVM MinGW (robust extraction)
      # =========================
      - name: Setup LLVM MinGW
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm-mingw.tar.xz
          sudo tar -xf llvm-mingw.tar.xz
          EXTRACTED_DIR=$(tar tf llvm-mingw.tar.xz | head -1 | cut -f1 -d'/')
          sudo mv "$EXTRACTED_DIR" llvm-mingw
          sudo rm llvm-mingw.tar.xz
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      # =========================
      # Android NDK
      # =========================
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # Termux sysroot
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir termux && cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          cp termuxfs.tar ../termux-rootfs.tar

      # =========================
      # VRAM Patch (corrected insertion points)
      # =========================
      - name: Apply VRAM patch
        run: |
          echo "Applying VRAM patches..."

          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
            { \
                const char *v = getenv("WINE_VRAM_SIZE"); \
                uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                uint32_t k; \
                for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                    if (object->memory_properties.memoryHeaps[k].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                        object->memory_properties.memoryHeaps[k].size = s; \
            }' "$FILE"
          fi

          FILE="dlls/wined3d/adapter_gl.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/gl_info->vidmem = vidmem;/a \
            { const char *v = getenv("WINE_VRAM_SIZE"); if (v) gl_info->vidmem = (uint64_t)atoll(v) * 1024 * 1024; }' "$FILE"
          fi

          FILE="dlls/wined3d/adapter_vk.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/device->adapter.vidmem = vidmem;/a \
            { const char *v = getenv("WINE_VRAM_SIZE"); if (v) device->adapter.vidmem = (uint64_t)atoll(v) * 1024 * 1024; }' "$FILE"
          fi

      # =========================
      # Build Wine tools (host)
      # =========================
      - name: Build Wine tools
        run: |
          ./autogen.sh
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-vulkan --without-gstreamer
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      # =========================
      # Build Wine ARM64EC (matching local script)
      # =========================
      - name: Build Wine ARM64EC
        run: |
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW:$TOOLCHAIN:$PATH"

          export deps="/data/data/com.termux/files/usr"
          export TARGET="aarch64-linux-android"
          export SDKVER="28"

          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AS=$CC
          export AR="$TOOLCHAIN/llvm-ar"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"

          # IMPORTANT: Android libraries go into X_LIBS, not global LDFLAGS (avoids preloader errors)
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib"
          export X_LIBS="-L$deps/lib -landroid-shmem -landroid-spawn"
          export LIBRARY_PATH="$deps/lib"

          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export FFMPEG_CFLAGS="-I$deps/include"
          export FFMPEG_LIBS="-L$deps/lib -lavcodec -lavformat -lavutil -lswresample"

          mkdir build && cd build

          ../configure \
            --host=${TARGET}${SDKVER} \
            --prefix=/usr \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-win64 \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --disable-tests \
            --disable-opencl \
            --without-alsa \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install DESTDIR=../compiled-files

          # Ensure wine launcher exists
          if [ ! -f ../compiled-files/usr/bin/wine ] && [ -f ../compiled-files/usr/bin/wine64 ]; then
            ln -s wine64 ../compiled-files/usr/bin/wine
          fi

      # =========================
      # Strip & shrink
      # =========================
      - name: Strip binaries
        run: |
          find compiled-files -type f -executable -exec strip --strip-unneeded {} \; || true
          rm -rf compiled-files/usr/include
          rm -rf compiled-files/usr/share/doc
          rm -rf compiled-files/usr/share/man

      # =========================
      # Package Wine
      # =========================
      - name: Package Wine
        run: |
          cd compiled-files
          tar -czf wine-termux-arm64ec.tar.gz *
          mv wine-termux-arm64ec.tar.gz ../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine-termux-arm64ec.tar.gz

      # =========================
      # Create Release with both Wine and Termux rootfs
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-${{ github.run_number }}
          name: Wine ARM64EC (Termux) + Rootfs
          body: |
            **Wine ARM64EC build for Termux**
            - Built with ARM64EC support and VRAM override patch.
            - Full Termux rootfs included (extract to `/data/data/com.termux/files`).
            - Set `WINE_VRAM_SIZE` (in MiB) to override VRAM.

            **Files:**
            - `wine-termux-arm64ec.tar.gz` – Wine installation (extract to `/data/data/com.termux/files/usr`)
            - `termux-rootfs.tar` – Full Termux rootfs
          files: |
            wine-termux-arm64ec.tar.gz
            termux-rootfs.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
