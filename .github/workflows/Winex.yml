name: xWine branch mz ARM64CE Termux

on:
  push:
    branches: [ upstream-arm64ec ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Wine source (from upstream-arm64ec branch)
        uses: actions/checkout@v4
        with:
          ref: upstream-arm64ec
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            debhelper-compat=13 gcc-mingw-w64 libz-mingw-w64-dev lzma flex bison quilt unzip \
            gettext icoutils sharutils pkg-config dctrl-tools imagemagick librsvg2-bin fontforge-nox \
            khronos-api unicode-data unicode-idna \
            libgl-dev libxi-dev libxt-dev libxmu-dev libx11-dev libxinerama-dev libxcursor-dev \
            libxext-dev libxfixes-dev libxrandr-dev libxrender-dev libxkbfile-dev libxxf86vm-dev \
            libxxf86dga-dev libglu1-mesa-dev libxcomposite-dev libxkbregistry-dev libxml-libxml-perl \
            libssl-dev libv4l-dev libsdl2-dev libkrb5-dev libudev-dev libpulse-dev libldap2-dev \
            unixodbc-dev libcups2-dev libcapi20-dev libvulkan-dev libopenal-dev libdbus-1-dev \
            freeglut3-dev libunwind-dev libpcap0.8-dev libasound2-dev libgphoto2-dev libosmesa6-dev \
            libncurses-dev libwayland-dev libfreetype-dev libgnutls28-dev libpcsclite-dev \
            libusb-1.0-0-dev libgettextpo-dev libfontconfig-dev ocl-icd-opencl-dev \
            libgstreamer-plugins-base1.0-dev libdrm-dev \
            libx11-dev:i386 libfreetype6-dev:i386 libxcursor-dev:i386 libxi-dev:i386 \
            libxshmfence-dev:i386 libxxf86vm-dev:i386 libxrandr-dev:i386 libxinerama-dev:i386 \
            libxcomposite-dev:i386 libglu1-mesa-dev:i386 libosmesa6-dev:i386 libdbus-1-dev:i386 \
            libncurses5-dev:i386 libsane-dev:i386 libv4l-dev:i386 libgphoto2-dev:i386 \
            liblcms2-dev:i386 libcups2-dev:i386 libfontconfig1-dev:i386 libgsm1-dev:i386 \
            libtiff5-dev:i386 libmpg123-dev:i386 libopenal-dev:i386 libldap2-dev:i386 libjpeg-dev:i386
          sudo apt purge -y llvm-18 clang-18

      # =========================
      # LLVM MinGW
      # =========================
      - name: Cache LLVM MinGW
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-20250920-${{ runner.os }}

      - name: Install LLVM MinGW
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          cd /opt
          sudo wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz -O llvm-mingw.tar.xz
          sudo tar -xf llvm-mingw.tar.xz
          EXTRACTED_DIR=$(tar tf llvm-mingw.tar.xz | head -1 | cut -f1 -d'/')
          sudo mv "$EXTRACTED_DIR" llvm-mingw
          sudo rm llvm-mingw.tar.xz

      - name: Export PATH
        run: echo "PATH=/opt/llvm-mingw/bin:$PATH" >> $GITHUB_ENV

      # =========================
      # Android NDK
      # =========================
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      # =========================
      # Termux sysroot
      # =========================
      - name: Setup Termux sysroot
        run: |
          mkdir -p termux && cd termux
          wget https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar xf termuxfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp
          cp termuxfs.tar ../termux-rootfs.tar

      # =========================
      # Apply patches (FEX, VRAM, etc.)
      # =========================
      - name: Apply comprehensive patches
        run: |
          echo "== 1. Fix /tmp paths for Termux =="
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec grep -l "/tmp" {} \; 2>/dev/null | \
            xargs -r sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true

          echo "== 2. InterlockedOr casting =="
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            sed -i 's/LONG dummy/long dummy/g' "$FILE"
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)&dummy, 0)|g' "$FILE"
          fi

          echo "== 3. Clean wdscore stubs =="
          FILE="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE" ]; then
            sed -i '/CDynamicArray/d' "$FILE"
          fi

          echo "== 4. ntdll virtual.c uninitialized vars =="
          FILE="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE" ]; then
            sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"
          fi

          echo "== 5. PE directory mapping =="
          FILE="dlls/ntdll/unix/loader.c"
          if [ -f "$FILE" ]; then
            sed -i 's|/x86_64-windows|/aarch64-windows|g' "$FILE"
          fi

          echo "== 6. ntdll loader buffer size =="
          FILE="dlls/ntdll/loader.c"
          if [ -f "$FILE" ]; then
            sed -i 's/ULONG buffer\[16\];/ULONG buffer[32];/g' "$FILE"
          fi

          echo "== 7. wine.inf: xtajit64 -> libarm64ecfex =="
          FILE="loader/wine.inf.in"
          if [ -f "$FILE" ]; then
            sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$FILE"
          fi

          echo "== 8. FEX YMM state (unwind.h) =="
          FILE="dlls/ntdll/unwind.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            sed -i '/ctx_flags_x64_to_arm/,/}/ {
              /CONTEXT_AMD64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_AMD64_XSTATE) ret |= CONTEXT_ARM64_FEX_YMMSTATE;/
            }' "$FILE"
            sed -i '/ctx_flags_arm_to_x64/,/}/ {
              /CONTEXT_ARM64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_ARM64_FEX_YMMSTATE) ret |= CONTEXT_AMD64_XSTATE;/
            }' "$FILE"
          fi

          echo "== 9. winnt.h FEX flag =="
          FILE="include/winnt.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            sed -i '/^#define CONTEXT_ARM64_X18/ s/.*/#define CONTEXT_ARM64_X18             (CONTEXT_ARM64 | 0x00000010)/' "$FILE"
            if ! grep -q 'CONTEXT_ARM64_XSTATE' "$FILE"; then
              sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE          (CONTEXT_ARM64 | 0x00000020)' "$FILE"
            fi
            sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE   (CONTEXT_ARM64 | 0x00000040)' "$FILE"
          fi

          echo "== 10. VRAM patches =="
          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                  uint32_t k; \
                  for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                      if (object->memory_properties.memoryHeaps[k].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                          object->memory_properties.memoryHeaps[k].size = s; \
              }' "$FILE"
          fi

          FILE="dlls/wined3d/adapter_gl.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/gl_info->vidmem = vidmem;/a \
              { const char *v = getenv("WINE_VRAM_SIZE"); if (v) gl_info->vidmem = (uint64_t)atoll(v) * 1024 * 1024; }' "$FILE"
          fi
          FILE="dlls/wined3d/adapter_vk.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/device->adapter.vidmem = vidmem;/a \
              { const char *v = getenv("WINE_VRAM_SIZE"); if (v) device->adapter.vidmem = (uint64_t)atoll(v) * 1024 * 1024; }' "$FILE"
          fi

          FILE="dlls/vkd3d/libs/vkd3d/device.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE"; then
            sed -i '/vkGetPhysicalDeviceMemoryProperties(physical_device, \&memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  if (v) { \
                      uint64_t s = (uint64_t)atoll(v) * 1024 * 1024; \
                      for (uint32_t i = 0; i < memory_properties.memoryHeapCount; ++i) \
                          if (memory_properties.memoryHeaps[i].flags & VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                              memory_properties.memoryHeaps[i].size = s; \
                  } \
              }' "$FILE"
          fi

          echo "== 11. pulseaudio fix =="
          FILE="dlls/winepulse.drv/pulse.c"
          if [ -f "$FILE" ]; then
            sed -i '/pthread_mutexattr_setrobust(&attr, PTHREAD_MUTEX_ROBUST);/i \
          #ifdef PTHREAD_MUTEX_ROBUST' "$FILE"
            sed -i '/pthread_mutexattr_setrobust(&attr, PTHREAD_MUTEX_ROBUST);/a \
           #endif' "$FILE"
          fi

          echo "== All patches applied =="

      # =========================
      # Build Wine tools (host)
      # =========================
      - name: Build Wine tools
        run: |
          if [ ! -f configure ]; then
            ./autogen.sh
          fi
          mkdir -p wine-tools
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all
          cp -r ./* ../wine-tools/

      # =========================
      # Build Wine (first pass)
      # =========================
      - name: Build Wine (first pass)
        run: |
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$TOOLCHAIN:$PATH"
          export deps="/data/data/com.termux/files/usr"

          export CC="$TOOLCHAIN/clang --target=aarch64-linux-android28"
          export CXX="$TOOLCHAIN/clang++ --target=aarch64-linux-android28"
          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-L$deps/lib"
          export LIBRARY_PATH="$deps/lib"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export FFMPEG_CFLAGS="-I$deps/include"
          export FFMPEG_LIBS="-L$deps/lib -lavcodec -lavformat -lavutil -lswresample"

          ./configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=/usr \
            --host=aarch64-linux-android \
            --with-mingw=clang \
            --with-wine-tools=./wine-tools \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --disable-opencl \
            --without-alsa \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc) 2>&1 | tee build.log | grep -E --color=never 'error:|warning:|undefined|Error |make(\[.*\])?:|ld\.lld:|clang(\+\+)?:|collect2:|Entering|Leaving|^make:'

      # =========================
      # Rebuild with Android shmem/spawn and install
      # =========================
      - name: Rebuild with -landroid-shmem/spawn and install
        run: |
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$TOOLCHAIN:$PATH"
          export deps="/data/data/com.termux/files/usr"

          export CC="$TOOLCHAIN/clang --target=aarch64-linux-android28"
          export CXX="$TOOLCHAIN/clang++ --target=aarch64-linux-android28"
          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export CFLAGS="-Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-L$deps/lib -landroid-shmem -landroid-spawn"
          export LIBRARY_PATH="$deps/lib"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export FFMPEG_CFLAGS="-I$deps/include"
          export FFMPEG_LIBS="-L$deps/lib -lavcodec -lavformat -lavutil -lswresample"

          ./configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=/usr \
            --host=aarch64-linux-android \
            --with-mingw=clang \
            --with-wine-tools=./wine-tools \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --disable-opencl \
            --without-alsa \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc) 2>&1 | tee build2.log | grep -E --color=never 'error:|warning:|undefined|Error |make(\[.*\])?:|ld\.lld:|clang(\+\+)?:|collect2:|Entering|Leaving|^make:'
          make install DESTDIR=compiled-files

          # Ensure wine binary exists
          if [ ! -f compiled-files/usr/bin/wine ] && [ -f compiled-files/usr/bin/wine64 ]; then
            ln -s wine64 compiled-files/usr/bin/wine
          fi
          ls -la compiled-files/usr/bin/

      - name: Package Wine artifact
        run: |
          cd compiled-files
          tar -czf wine-termux-arm64-proton-vram.tar.gz *
          mv wine-termux-arm64-proton-vram.tar.gz ../

      - name: Upload Wine artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-termux-arm64-proton-vram
          path: wine-termux-arm64-proton-vram.tar.gz

      # =========================
      # Create release with both Wine and Termux rootfs
      # =========================
      - name: Create GitHub Release
        id: release_tag
        run: echo "tag=wine-termux-${{ github.run_number }}-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Wine ARM64 for Termux + Full Rootfs"
          body: |
            **Wine ARM64EC build for Termux**
            - Built with ARM64EC support, Proton patches, and VRAM override
            - Termux rootfs (full) included as separate tarball
            - Set `WINE_VRAM_SIZE` (in MiB) to override VRAM.

            **Files:**
            - `wine-termux-arm64-proton-vram.tar.gz` – Wine installation (extract to /data/data/com.termux/files/usr)
            - `termux-rootfs.tar` – Full Termux rootfs (extract to /data/data/com.termux/files/usr)
          files: |
            wine-termux-arm64-proton-vram.tar.gz
            termux-rootfs.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
