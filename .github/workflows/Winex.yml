name: xWine mz patch ARM64CE Termux (longjunyu2/wine-custom)

on:
  push:
    branches: [ bleeding-edge ]
  workflow_dispatch:

env:
  LLVMMINGW_DATE: 20250920
  LLVMMINGW_NAME: llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout longjunyu2/wine-custom (custom-wine-9.16)
        uses: actions/checkout@v4
        with:
          repository: longjunyu2/wine-custom
          ref: custom-wine-9.16
          fetch-depth: 0

      - name: Install dependencies (minimal, no clang/llvm/mingw-w64)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            binutils-aarch64-linux-gnu \
              libc6-dev-arm64-cross \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev libfreetype-dev:i386 libfontconfig-dev:i386 \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev \
            libasound2-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libglib2.0-dev
          # Clean apt cache (huge space saver)
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          # Remove unnecessary docs/locales
          sudo rm -rf /usr/share/doc/*
          sudo rm -rf /usr/share/man/*
          sudo rm -rf /usr/share/locale/*

      - name: Setup LLVM MinGW (bylaws release with retry)
        run: |
          sudo mkdir -p /opt
          cd /opt

          URL="https://github.com/bylaws/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz"

          echo "Downloading: $URL"

          # FIXED wget with retry logic
          sudo wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 "$URL" -O llvm-mingw.tar.xz

          # safety check
          [ -f llvm-mingw.tar.xz ] || { echo "❌ Download failed"; exit 1; }

          sudo tar -xJf llvm-mingw.tar.xz
          sudo rm llvm-mingw.tar.xz

          export LLVM_MINGW=/opt/${{ env.LLVMMINGW_NAME }}

          echo "$LLVM_MINGW/bin" >> $GITHUB_PATH

          # override clang
          sudo ln -sf $LLVM_MINGW/bin/clang /usr/bin/clang
          sudo ln -sf $LLVM_MINGW/bin/clang++ /usr/bin/clang++
          sudo ln -sf $LLVM_MINGW/bin/lld /usr/bin/lld

          # verify
          clang --version
          which clang

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*


      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      - name: Setup Termux sysroot
        run: |
          mkdir termux && cd termux
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/wine-14/termux-rootfs.tar
          tar xf termux-rootfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp

      # =========================
      # Install missing .deb packages into the sysroot (fixed permissions)
      # =========================
      - name: Install libandroid-shmem and libandroid-spawn .deb packages
        run: |
          # Download .deb files
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn_0.3_aarch64.deb

          for deb in *.deb; do
            ar x "$deb"
            tar -xf data.tar.* -C /tmp  # extract to temp dir
            # Copy contents to /data (preserve ownership and permissions)
            sudo cp -a /tmp/data/* /
            rm -rf /tmp/data
            rm -f data.tar.* debian-binary control.tar.*
          done

          echo "Packages installed into /data/data/com.termux/files/usr"

      - name: Build Wine tools (host)
        run: |
          # Force llvm-mingw compiler for host tools as well
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export CC=clang
          export CXX=clang++
          if [ ! -f ./configure ]; then
            ./autogen.sh
          fi
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-vulkan --without-gstreamer
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      - name: Build Wine ARM64EC (without arm64ec, using llvm-mingw)
        run: |
          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${{ env.LLVMMINGW_NAME }}/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export deps="/data/data/com.termux/files/usr"
          export ARCH="aarch64"
          export SDKVER="28"
          export TARGET="aarch64-linux-android"
          export install_prefix="$WORKDIR/wine-build"
          export winetools_dir="./wine-tools"

          # Force llvm-mingw toolchain
          export CC="clang --target=aarch64-linux-gnu"
          export CXX="clang++ --target=aarch64-linux-gnu"
          export CROSSCC="arm64ec-w64-mingw32-clang"   # may not be used but safe
          export CROSSCXX="arm64ec-w64-mingw32-clang++"
          export LD=lld
          export AR="$LLVM_MINGW_TOOLCHAIN/llvm-ar"
          export RANLIB="$LLVM_MINGW_TOOLCHAIN/llvm-ranlib"
          export DLLTOOL="$LLVM_MINGW_TOOLCHAIN/llvm-dlltool"
          export STRIP="$LLVM_MINGW_TOOLCHAIN/llvm-strip"

          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export ACLOCAL_PATH="$deps/lib/aclocal:$deps/share/aclocal"
          export CPPFLAGS="-I$deps/include --sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          export CFLAGS="-Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$deps/lib -landroid-shmem -landroid-spawn"
          export LIBRARY_PATH="$deps/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"
          export X_CFLAGS="-I$deps/include"
          export X_LIBS="-L$deps/lib -landroid-shmem"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export GSTREAMER_CFLAGS="-I$deps/include/gstreamer-1.0 -I$deps/include/glib-2.0 -I$deps/lib/glib-2.0/include -I$deps/glib-2.0/include -I$deps/lib/gstreamer-1.0/include"
          export GSTREAMER_LIBS="-L$deps/lib -lgstgl-1.0 -lgstapp-1.0 -lgstvideo-1.0 -lgstaudio-1.0 -lglib-2.0 -lgobject-2.0 -lgio-2.0 -lgsttag-1.0 -lgstbase-1.0 -lgstreamer-1.0"
          export FFMPEG_CFLAGS="-I$deps/include/libavutil -I$deps/include/libavcodec -I$deps/include/libavformat"
          export FFMPEG_LIBS="-L$deps/lib -lavutil -lavcodec -lavformat"

          ./configure \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=${install_prefix} \
            --host=${TARGET}${SDKVER} \
            --with-mingw=clang \
            --with-wine-tools="$winetools_dir" \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --with-alsa \
            --disable-win16 \
            --disable-opencl \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --disable-amd_ags_x64 \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install -j$(nproc)

          ls -la "$install_prefix/"

      - name: Strip binaries and clean up
        run: |
          cd wine-build
          rm -rf share/man share/doc
          cd ..

      - name: Package Wine
        run: |
          cd wine-build
          tar -cJf ../wine-termux-arm64ec.tar.xz .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine-termux-arm64ec.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-${{ github.run_id }}
          name: Wine ARM64EC for Termux (longjunyu2/wine-custom 9.16)
          body: |
            **Wine ARM64EC build for Termux**
            - Source: longjunyu2/wine-custom (custom-wine-9.16)
            - Includes full gamepad patches (dinput, dinput8, xinput)
            - Extract to `/data/data/com.termux/files/usr`
          files: wine-termux-arm64ec.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
