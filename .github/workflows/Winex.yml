name: xWine mz patch ARM64CE Termux (longjunyu2/wine-custom)

on:
  push:
    branches: [ bleeding-edge ]
  workflow_dispatch:

env:
  LLVMMINGW_DATE: 20250920
  LLVMMINGW_NAME: llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout longjunyu2/wine-custom (custom-wine-9.16)
        uses: actions/checkout@v4
        with:
          repository: longjunyu2/wine-custom
          ref: custom-wine-9.16
          fetch-depth: 0

      - name: Install host dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential gcc-multilib g++-multilib \
            flex bison unzip pkg-config gettext \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libxml-libxml-perl libssl-dev \
            libfreetype-dev libpulse-dev libsdl2-dev libfreetype-dev:i386 libfontconfig-dev:i386 \
            libdbus-1-dev libfontconfig-dev \
            libgnutls28-dev libopenal-dev \
            libasound2-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libglib2.0-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup LLVM MinGW
        run: |
          sudo mkdir -p /opt
          cd /opt
          URL="https://github.com/bylaws/llvm-mingw/releases/download/${LLVMMINGW_DATE}/${LLVMMINGW_NAME}.tar.xz"
          echo "Downloading: $URL"
          sudo wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 "$URL" -O llvm-mingw.tar.xz
          [ -f llvm-mingw.tar.xz ] || { echo "❌ Download failed"; exit 1; }
          sudo tar -xJf llvm-mingw.tar.xz
          sudo rm llvm-mingw.tar.xz
          echo "/opt/${LLVMMINGW_NAME}/bin" >> $GITHUB_PATH
          /opt/${LLVMMINGW_NAME}/bin/clang --version

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      - name: Setup Termux sysroot
        run: |
          mkdir termux && cd termux
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/wine-14/termux-rootfs.tar
          tar xf termux-rootfs.tar
          sudo mv data /data
          sudo chown -R $(whoami):$(whoami) /data
          mkdir -p /data/data/com.termux/files/usr/tmp

      - name: Install libandroid-shmem and libandroid-spawn .deb packages
        run: |
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-shmem_0.7_aarch64.deb
          wget https://github.com/xodiosx/Wine-arm64ce/releases/download/1.1.0/libandroid-spawn_0.3_aarch64.deb

          for deb in *.deb; do
            ar x "$deb"
            sudo tar -xf data.tar.* -C / \
              --no-overwrite-dir \
              --no-same-owner \
              --no-same-permissions \
              --touch
            rm -f data.tar.* debian-binary control.tar.*
          done
          echo "Packages installed into /data/data/com.termux/files/usr"

      - name: Build Wine tools (host)
        run: |
          export PATH="/opt/${LLVMMINGW_NAME}/bin:$PATH"
          if [ ! -f ./configure ]; then
            ./autogen.sh
          fi
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-vulkan --without-gstreamer
          make -j$(nproc) __tooldeps__ nls/all
          cd ..
          mv wine-tools-build wine-tools

      # ======================================================================
      # FIXED: Correct NDK sysroot paths, host triplet, and test compile
      # ======================================================================
      - name: Build Wine (hybrid WoW64)
        run: |
          export WORKDIR="$GITHUB_WORKSPACE"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export LLVM_MINGW_TOOLCHAIN="/opt/${LLVMMINGW_NAME}/bin"
          export deps="/data/data/com.termux/files/usr"
          export SYSROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          export SDKVER="28"
          export TARGET="aarch64-linux-android"
          export install_prefix="$WORKDIR/wine-build"
          export winetools_dir="./wine-tools"

          # ------------------------------------------------------------
          # 1. Android (Unix) compiler – NDK only
          # ------------------------------------------------------------
          export CC="$TOOLCHAIN/${TARGET}${SDKVER}-clang"
          export CXX="$TOOLCHAIN/${TARGET}${SDKVER}-clang++"
          export AS="$CC"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld.lld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"

          # ------------------------------------------------------------
          # 2. Mingw (PE) compiler – LLVM MinGW in PATH only
          # ------------------------------------------------------------
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export DLLTOOL="$LLVM_MINGW_TOOLCHAIN/llvm-dlltool"

          # ------------------------------------------------------------
          # 3. pkg-config
          # ------------------------------------------------------------
          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig:$SYSROOT/usr/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$PKG_CONFIG_PATH"

          # ------------------------------------------------------------
          # 4. Compiler & linker flags (CORRECT NDK PATHS)
          # ------------------------------------------------------------
          # NDK's actual library path: usr/lib/$TARGET/$SDKVER
          export NDK_LIBDIR="$SYSROOT/usr/lib/$TARGET/$SDKVER"

          export CPPFLAGS="--sysroot=$SYSROOT -I$deps/include"
          export CFLAGS="--sysroot=$SYSROOT \
            -Wno-declaration-after-statement \
            -Wno-implicit-function-declaration \
            -Wno-int-conversion"
          export LDFLAGS="--sysroot=$SYSROOT \
            -L$deps/lib \
            -L$NDK_LIBDIR \
            -Wl,-rpath-link=$deps/lib \
            -Wl,-rpath-link=$NDK_LIBDIR \
            -fuse-ld=lld"
          export LIBRARY_PATH="$deps/lib:$NDK_LIBDIR"

          # Required NDK runtime libraries
          export LIBS="-landroid-shmem -landroid-spawn -lc++ -ldl -llog -lunwind"

          # Optional library hints
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export GSTREAMER_CFLAGS="-I$deps/include/gstreamer-1.0 -I$deps/include/glib-2.0 -I$deps/lib/glib-2.0/include"
          export GSTREAMER_LIBS="-L$deps/lib -lgstgl-1.0 -lgstapp-1.0 -lgstvideo-1.0 -lgstaudio-1.0 -lglib-2.0 -lgobject-2.0 -lgio-2.0 -lgsttag-1.0 -lgstbase-1.0 -lgstreamer-1.0"

          # ------------------------------------------------------------
          # 5. Verify toolchains
          # ------------------------------------------------------------
          echo "=== Android (Unix) compiler ==="
          $CC --version
          echo "=== MinGW (PE) compiler (in PATH) ==="
          which clang
          clang --version

          # ------------------------------------------------------------
          # 6. QUICK TEST: Ensure compiler can link a simple program
          # ------------------------------------------------------------
          echo 'int main(){return 0;}' > test.c
          echo "Testing compiler with flags: $CC test.c -o test $CFLAGS $LDFLAGS $LIBS"
          $CC test.c -o test $CFLAGS $LDFLAGS $LIBS || {
            echo "❌ Compiler test failed! See config.log later."
            exit 1
          }
          echo "✅ Compiler test passed."

          # ------------------------------------------------------------
          # 7. Configure Wine
          # ------------------------------------------------------------
          # Host must be just the target triplet (no SDK version)
          ./configure \
            --enable-archs=aarch64,i386 \
            --prefix="$install_prefix" \
            --host="$TARGET" \
            --with-mingw \
            --with-wine-tools="$winetools_dir" \
            --enable-win64 \
            --enable-nls \
            --with-pulse \
            --with-alsa \
            --disable-win16 \
            --disable-opencl \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --without-xxf86vm \
            --enable-wineandroid_drv=no

          make -j$(nproc)
          make install -j$(nproc)

          ls -la "$install_prefix/"

      - name: Strip binaries and clean up
        run: |
          cd wine-build
          rm -rf share/man share/doc
          cd ..

      - name: Package Wine
        run: |
          cd wine-build
          tar -cJf ../wine-termux-arm64ec.tar.xz .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: wine-termux-arm64ec.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-${{ github.run_id }}
          name: Wine for Termux (longjunyu2/wine-custom 9.16)
          body: |
            **Wine hybrid WoW64 build for Termux (aarch64 + i386)**
            - Source: longjunyu2/wine-custom (custom-wine-9.16)
            - LLVM MinGW used for PE binaries
            - Includes gamepad patches (dinput, dinput8, xinput)
            - Extract to `/data/data/com.termux/files/usr`
          files: wine-termux-arm64ec.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
